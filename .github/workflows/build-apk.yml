name: Build APK from ZIP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP file
        run: |
          unzip private-agent-FIXED100.zip
          # Dono cases handle karo
          if [ -d "fixed-agent-v100" ]; then mv fixed-agent-v100 fixed-agent; fi

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create .env from Secrets
        working-directory: fixed-agent
        run: |
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" > .env
          echo "CHAT_ID=${{ secrets.CHAT_ID }}" >> .env

      - name: Flutter pub get
        working-directory: fixed-agent
        run: flutter pub get

      - name: Build APK
        working-directory: fixed-agent
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: agent-apk
          path: fixed-agent/build/app/outputs/flutter-apk/app-release.apk
